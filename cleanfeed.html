<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CleanFeed</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,system-ui;
background:#15202b;
color:white;
}

header{
position:sticky;
top:0;
background:#15202b;
border-bottom:1px solid #38444d;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
z-index:2;
}

#feed{
max-width:600px;
margin:auto;
}

.tweet{
display:flex;
padding:14px;
border-bottom:1px solid #38444d;
cursor:pointer;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
margin-right:12px;
}

.content{
flex:1;
}

.name{
font-weight:bold;
}

.handle{
color:#8899a6;
margin-left:6px;
}

.time{
color:#8899a6;
margin-left:6px;
}

.text{
margin-top:6px;
line-height:1.4;
}

.image{
margin-top:10px;
border-radius:12px;
max-width:100%;
}

.controls{
display:flex;
gap:10px;
}

button{
background:#1da1f2;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

.thread{
padding:20px;
border-bottom:1px solid #38444d;
}

</style>
</head>

<body>

<header>

<span>CleanFeed</span>

<div class="controls">
<button onclick="addAccount()">Add</button>
<button onclick="refreshFeed()">Refresh</button>
</div>

</header>

<div id="feed"></div>

<script>

const INSTANCES=[
'nitter.tiekoetter.com',
'nitter.poast.org',
'nitter.net',
'nitter.unixfox.eu'
]

const PROXIES=[
'https://corsproxy.io/?',
'https://api.allorigins.win/raw?url=',
'https://proxy.cors.sh/',
'https://thingproxy.freeboard.io/fetch/'
]

let accounts=JSON.parse(localStorage.getItem('cf_accounts')||'["RapSheet"]')

let allTweets=[]
let rendered=0
const PAGE_SIZE=20

async function proxiedFetch(url){

for(const proxy of PROXIES){

try{

const target=proxy.includes('?')
?proxy+encodeURIComponent(url)
:proxy+url

const r=await fetch(target)

if(r.ok) return r

}catch(e){}

}

throw new Error("proxy failed")

}

async function fetchFeed(account){

for(const inst of INSTANCES){

try{

const url=`https://${inst}/${account}/rss`

const resp=await proxiedFetch(url)

const text=await resp.text()

return parseRSS(text,account)

}catch(e){}

}

return[]

}

function parseRSS(xml,account){

const parser=new DOMParser()

const doc=parser.parseFromString(xml,"text/xml")

const items=[...doc.querySelectorAll("item")]

return items.map(item=>{

const title=item.querySelector("title")?.textContent||""
const link=item.querySelector("link")?.textContent||""
const pub=item.querySelector("pubDate")?.textContent||""

let image=null

const imgMatch=title.match(/https?:\/\/.*\.(jpg|png|jpeg)/)

if(imgMatch) image=imgMatch[0]

return{

name:account,
handle:"@"+account,
text:title,
image:image,
link:link,
date:new Date(pub),
avatar:`https://unavatar.io/twitter/${account}`

}

})

}

function timeAgo(date){

const seconds=Math.floor((Date.now()-date)/1000)

if(seconds<60) return seconds+"s"

if(seconds<3600) return Math.floor(seconds/60)+"m"

if(seconds<86400) return Math.floor(seconds/3600)+"h"

return Math.floor(seconds/86400)+"d"

}

function renderTweet(t){

const div=document.createElement("div")

div.className="tweet"

div.onclick=()=>openThread(t)

div.innerHTML=`

<img class="avatar" src="${t.avatar}">

<div class="content">

<span class="name">${t.name}</span>
<span class="handle">${t.handle}</span>
<span class="time">· ${timeAgo(t.date)}</span>

<div class="text">${t.text}</div>

${t.image?`<img class="image" src="${t.image}">`:""}

</div>
`

return div

}

function renderMore(){

const feed=document.getElementById("feed")

const slice=allTweets.slice(rendered,rendered+PAGE_SIZE)

slice.forEach(t=>feed.appendChild(renderTweet(t)))

rendered+=slice.length

}

function openThread(tweet){

const feed=document.getElementById("feed")

feed.innerHTML=""

const div=document.createElement("div")

div.className="thread"

div.innerHTML=`

<h3>${tweet.name}</h3>

<p>${tweet.text}</p>

<p>
<a href="${tweet.link}" target="_blank">
Open original tweet
</a>
</p>

<button onclick="goHome()">Back</button>

`

feed.appendChild(div)

}

function goHome(){

rendered=0

document.getElementById("feed").innerHTML=""

renderMore()

}

async function loadFeed(){

allTweets=[]

for(const a of accounts){

const tweets=await fetchFeed(a)

allTweets=allTweets.concat(tweets)

}

allTweets.sort((a,b)=>b.date-a.date)

localStorage.setItem("cf_cache",JSON.stringify(allTweets))

rendered=0

document.getElementById("feed").innerHTML=""

renderMore()

}

function refreshFeed(){

loadFeed()

}

function addAccount(){

const user=prompt("Account name")

if(!user) return

accounts.push(user)

localStorage.setItem("cf_accounts",JSON.stringify(accounts))

loadFeed()

}

function loadCache(){

const cache=localStorage.getItem("cf_cache")

if(cache){

allTweets=JSON.parse(cache).map(t=>({...t,date:new Date(t.date)}))

renderMore()

}

}

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){

renderMore()

}

})

loadCache()

loadFeed()

</script>

</body>
</html>
